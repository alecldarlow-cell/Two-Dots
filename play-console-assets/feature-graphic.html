<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Two Dots — feature graphic source</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    /*
      Two Dots — Google Play Store feature graphic.
      Target output: 1024 × 500 PNG (no alpha).

      Easy export:
        powershell -ExecutionPolicy Bypass -File .\play-console-assets\export-feature-graphic.ps1

      Manual export:
        Open in Chrome → Ctrl+Shift+I → click <div id="graphic"> →
        Ctrl+Shift+P → "Capture node screenshot".

      Design intent (v3 — minimalist):
        Two giant glowing dots floating on a near-black canvas. No pipe, no
        wordmark hero. The actual in-game experience is mostly black space
        with two glowing dots — the feature graphic mirrors that. A faint 1px
        centre divider is the only hint at the two-lane mechanic. "TWO DOTS"
        sits tiny at the bottom like a film credit, not a billboard.
    */
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', 'SFMono-Regular', 'Menlo', 'Consolas', 'Courier New', monospace;
    }
    /*
      Export mode — used by export-feature-graphic.ps1. Strips the grey
      letterbox and the on-screen instructions so a headless Chromium
      screenshot at --window-size=1024,500 captures the graphic edge-to-edge.
    */
    body.export {
      background: #07070f;
      align-items: stretch;
      justify-content: stretch;
      min-height: 0;
      height: 500px;
      width: 1024px;
      overflow: hidden;
    }
    body.export .instructions { display: none !important; }
    body.export #graphic { box-shadow: none; }

    #graphic {
      width: 1024px;
      height: 500px;
      background: #07070f;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    /* Faint centre divider — only structural anchor for the two-lane semantic.
       Inset top/bottom so it doesn't run hard edge-to-edge. */
    .center-divider {
      position: absolute;
      left: 50%;
      top: 70px;
      bottom: 70px;
      width: 1px;
      background: linear-gradient(180deg,
        rgba(122, 192, 232, 0)    0%,
        rgba(122, 192, 232, 0.18) 30%,
        rgba(122, 192, 232, 0.18) 70%,
        rgba(122, 192, 232, 0)    100%);
      transform: translateX(-0.5px);
      pointer-events: none;
    }

    /*
      Dots — large enough to dominate at thumbnail size. Lane-centred
      horizontally (x=256 and x=768 = 25% and 75%), vertically centred.
      Multi-layer box-shadow builds the halo:
        layer 1 — hairline white inset rim, gives the dot a clean edge
        layer 2 — tight bright glow, the "core" halo
        layer 3 — broad mid halo, fades into the dark
      No far/diffuse halo — keeps the centre of the canvas dark and the dots
      reading as discrete objects rather than a coloured wash.
    */
    .dot {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .dot.left {
      left: 256px;
      background: #FF5E35;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.12),
        0 0 80px 24px rgba(255, 94, 53, 0.55),
        0 0 220px 60px rgba(255, 94, 53, 0.16);
    }
    .dot.right {
      left: 768px;
      background: #2ECFFF;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.12),
        0 0 80px 24px rgba(46, 207, 255, 0.55),
        0 0 220px 60px rgba(46, 207, 255, 0.16);
    }

    /* Wordmark — small, bottom, letter-spaced. Film-credit treatment. */
    .wordmark {
      position: absolute;
      bottom: 36px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 14px;
      color: rgba(255, 255, 255, 0.62);
      text-transform: uppercase;
      pointer-events: none;
      /* The trailing letter-spacing pushes the centre off by half a tracking
         unit; a left padding equal to the letter-spacing rebalances it. */
      padding-left: 14px;
    }

    /* On-screen export instructions — hidden in export mode */
    .instructions {
      position: fixed;
      top: 12px;
      left: 12px;
      max-width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.45;
      color: #ddd;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px 14px;
      border-radius: 6px;
      z-index: 100;
    }
    .instructions code {
      background: rgba(255, 255, 255, 0.1);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }
    @media print {
      .instructions { display: none; }
      html, body { background: transparent; }
    }
  </style>
</head>
<body>
  <div class="instructions">
    <strong>Easy export (PowerShell):</strong><br />
    <code>powershell -ExecutionPolicy Bypass -File .\play-console-assets\export-feature-graphic.ps1</code><br /><br />
    <strong>Manual export:</strong><br />
    1. <code>Ctrl+Shift+I</code> (DevTools)<br />
    2. Click <code>&lt;div id="graphic"&gt;</code> in Elements<br />
    3. <code>Ctrl+Shift+P</code> → "Capture node screenshot"
  </div>

  <div id="graphic">
    <div class="center-divider"></div>
    <div class="dot left"></div>
    <div class="dot right"></div>
    <div class="wordmark">Two Dots</div>
  </div>

  <script>
    // Toggle export mode via ?export in the URL — used by export-feature-graphic.ps1
    if (new URLSearchParams(location.search).has('export')) {
      document.body.classList.add('export');
    }
  </script>
</body>
</html>
