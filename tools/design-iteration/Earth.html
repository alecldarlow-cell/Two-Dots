<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World 02 — Earth</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a12; }
    body { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="frames/tweaks-panel.jsx"></script>

  <script src="world/theme-schema.js?v=2"></script>
  <script src="world/theme-moon.js"></script>
  <script src="world/theme-earth.js?v=4"></script>
  <script>
    window.CURRENT_THEME = window.EarthTheme;
    window.CURRENT_THEME_INDEX = '02';
    window.CURRENT_THEME_GRAVITY_LABEL = 'standard gravity';
  </script>
  <script type="text/babel" src="world/world-renderer.jsx"></script>
  <script type="text/babel" src="world/game-overlay.jsx"></script>

  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Standalone-mode bootstrap: the TweaksPanel is designed to be activated
    // by a host toolbar (postMessage __activate_edit_mode). When running via
    // local http-server there's no host, so we listen for the panel's "I'm
    // available" message and respond with the activation message ourselves.
    window.addEventListener('message', (e) => {
      if (e && e.data && e.data.type === '__edit_mode_available') {
        window.postMessage({ type: '__activate_edit_mode' }, '*');
      }
    });
  </script>
</body>
</html>
