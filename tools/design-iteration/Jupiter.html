<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World 03 — Jupiter</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a12; }
    body { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="frames/tweaks-panel.jsx"></script>

  <script src="world/theme-schema.js"></script>
  <script src="world/theme-jupiter.js"></script>
  <script>
    window.CURRENT_THEME = window.JupiterTheme;
    window.CURRENT_THEME_INDEX = '03';
    window.CURRENT_THEME_GRAVITY_LABEL = 'high gravity';
  </script>
  <script type="text/babel" src="world/world-renderer.jsx"></script>
  <script type="text/babel" src="world/game-overlay.jsx"></script>

  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Standalone-mode bootstrap: auto-activate the tweaks panel when there's
    // no host toolbar (same pattern as Earth.html / Moon.html).
    window.addEventListener('message', (e) => {
      if (e && e.data && e.data.type === '__edit_mode_available') {
        window.postMessage({ type: '__activate_edit_mode' }, '*');
      }
    });
  </script>
</body>
</html>
